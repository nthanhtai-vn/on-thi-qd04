<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04</title>

<style>
body{
    margin:0;
    padding:30px;
    background:#000;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
    color:white;
}

/* 🌌 STAR */
#stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation:fall linear infinite;
}
@keyframes fall{
    from{transform:translateY(0);}
    to{transform:translateY(100vh);}
}

/* TITLE */
h1{
    font-size:28px;
    text-transform:uppercase;
    background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:rgb 5s linear infinite;
}
@keyframes rgb{
    0%{background-position:400%;}
    100%{background-position:0%;}
}

/* CONTAINER */
.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
    margin-top:20px;
}

.card img{
    width:320px;
    border-radius:12px;
    transition:0.3s;
    cursor:pointer;
}
.card img:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px cyan;
}

/* MENU */
.menu{
    position:fixed;
    top:20px;
    right:20px;
}

.menu-btn{
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(90deg,cyan,blue,violet);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    cursor:pointer;
}

.menu-list{
    display:none;
    flex-direction:column;
    position:absolute;
    right:0;
    top:65px;
    background:#111;
    padding:10px;
    border-radius:10px;
}

.menu-list button{
    background:none;
    border:none;
    color:white;
    padding:10px;
    text-align:left;
    cursor:pointer;
}

.menu-list button:hover{
    color:cyan;
}

/* CONTACT */
.contact{
    display:none;
    position:fixed;
    bottom:80px;
    right:20px;
    background:#111;
    padding:15px;
    border-radius:10px;
}

.contact a{
    display:block;
    color:white;
    margin:8px 0;
    text-decoration:none;
}
.contact a:hover{
    color:cyan;
}
</style>
</head>

<body>

<div id="stars"></div>

<h1>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04</h1>

<!-- MENU -->
<div class="menu">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="menu-list" id="menu">
        <button onclick="showPage('home')">🏠 Trang chủ</button>
        <button onclick="showPage('luyende')">🧠 Luyện đề</button>
        <button onclick="showPage('tailieu')">📚 Tài liệu</button>
        <button onclick="toggleContact()">💬 Liên hệ</button>
    </div>
</div>

<!-- CONTACT -->
<div class="contact" id="contact">
    <a href="https://facebook.com/thanh.tai.207" target="_blank">Facebook</a>
    <a href="https://zalo.me/0352332842" target="_blank">Zalo</a>
    <a href="https://m.me/" target="_blank">Messenger</a>
</div>

<!-- CONTENT -->
<div id="content"></div>

<script>

// DATA POSTER
const home = `
<div class="container">
<a class="card" href="https://wayground.com/join?gc=15993929" target="_blank"><img src="poster-su.png"></a>
<a class="card" href="https://wayground.com/join?gc=49417289" target="_blank"><img src="poster-dia.png"></a>
<a class="card" href="https://drive.google.com/drive/folders/1XjkgB0eCab9F9WjYYCW_Ls7Qgza83J1B" target="_blank"><img src="dinhtinh.png"></a>
<a class="card" href="https://drive.google.com/drive/folders/15Imf-08fg8yrheXhrrH_b-YWzosJc47d" target="_blank"><img src="dinhluong.png"></a>
</div>`;

const luyende = `
<div class="container">
<a class="card" href="https://wayground.com/join?gc=15993929" target="_blank"><img src="poster-su.png"></a>
<a class="card" href="https://wayground.com/join?gc=49417289" target="_blank"><img src="poster-dia.png"></a>
</div>`;

const tailieu = `
<div class="container">
<a class="card" href="https://drive.google.com/drive/folders/1XjkgB0eCab9F9WjYYCW_Ls7Qgza83J1B" target="_blank"><img src="dinhtinh.png"></a>
<a class="card" href="https://drive.google.com/drive/folders/15Imf-08fg8yrheXhrrH_b-YWzosJc47d" target="_blank"><img src="dinhluong.png"></a>
</div>`;

function showPage(page){
    if(page === "home") document.getElementById("content").innerHTML = home;
    if(page === "luyende") document.getElementById("content").innerHTML = luyende;
    if(page === "tailieu") document.getElementById("content").innerHTML = tailieu;
}

function toggleMenu(){
    document.getElementById("menu").style.display =
    document.getElementById("menu").style.display === "flex" ? "none" : "flex";
}

function toggleContact(){
    let c = document.getElementById("contact");
    c.style.display = c.style.display === "block" ? "none" : "block";
}

// init
showPage("home");

// stars
for(let i=0;i<80;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    s.style.animationDuration=(Math.random()*5+3)+"s";
    document.getElementById("stars").appendChild(s);
}

</script>

</body>
</html>
