<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG</title>

    <style>
        body{
            margin:0;
            padding:30px;
            background:#000;
            font-family:Arial, Helvetica, sans-serif;
            text-align:center;
            overflow:hidden;
        }

        /* 🌌 NỀN SAO */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: moveStars linear infinite;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(100vh); }
        }

        h1{
            margin-bottom:40px;
            font-size:32px;
            text-transform:uppercase;
            font-weight:bold;

            background: linear-gradient(
                90deg,
                red,
                orange,
                yellow,
                lime,
                cyan,
                blue,
                violet,
                red
            );

            background-size: 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: rgbText 5s linear infinite;

            text-shadow:
                0 0 10px rgba(255,255,255,0.5),
                0 0 20px rgba(255,255,255,0.3),
                0 0 30px rgba(255,255,255,0.2);
        }

        @keyframes rgbText{
            0%{ background-position: 400% 0; }
            100%{ background-position: 0% 0; }
        }

        .container{
            display:flex;
            justify-content:center;
            gap:50px;
            flex-wrap:wrap;
        }

        .card{
            width:400px;
        }

        .card img{
            width:100%;
            border-radius:12px;
            box-shadow:0 0 15px rgba(255,255,255,0.2);
            transition:all .3s ease;
            cursor:pointer;
        }

        .card img:hover{
            transform:scale(1.05);
            box-shadow:
                0 0 20px cyan,
                0 0 40px blue,
                0 0 60px violet;
        }

        /* ===== MENU GÓC PHẢI PRO ===== */
        .top-menu{
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .menu-btn{
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(90deg, cyan, blue, violet);
            color: white;
            font-size: 26px;
            display:flex;
            justify-content:center;
            align-items:center;
            cursor:pointer;
            box-shadow:0 0 15px rgba(0,255,255,0.5);
        }

        .dropdown{
            position:absolute;
            top:60px;
            right:0;
            width:180px;
            background:rgba(20,20,20,0.95);
            border-radius:12px;
            overflow:hidden;
            display:none;
        }

        .dropdown a{
            display:block;
            padding:12px;
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

        .dropdown a:hover{
            background:cyan;
            color:black;
        }

        .top-menu.open .dropdown{
            display:block;
        }

        /* ===== MENU VÒNG TRÒN ===== */
        .radial-menu{
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 120px;
            height: 120px;
            z-index: 999;
        }

        .center-btn{
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(90deg, cyan, blue, violet);
            color: white;
            font-size: 26px;
            display:flex;
            justify-content:center;
            align-items:center;
            cursor:pointer;
            box-shadow:0 0 15px rgba(0,255,255,0.5);
        }

        .radial-item{
            position:absolute;
            width:45px;
            height:45px;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            text-decoration:none;
            transform:scale(0);
            opacity:0;
            transition:0.3s;
        }

        .fb{ background:#1877F2; }
        .zalo{ background:#00c300; }
        .mess{ background:#0084ff; }

        .radial-menu.open .fb{
            transform: translate(-80px,-80px) scale(1);
            opacity:1;
        }

        .radial-menu.open .zalo{
            transform: translate(0px,-110px) scale(1);
            opacity:1;
        }

        .radial-menu.open .mess{
            transform: translate(-110px,0px) scale(1);
            opacity:1;
        }

    </style>
</head>

<body>

<div id="stars"></div>

<!-- 🌐 MENU GÓC PHẢI -->
<div class="top-menu" id="topMenu">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="dropdown">
        <a href="#">🏠 Trang chủ</a>
        <a href="#tailieu">📚 Tài liệu</a>
        <a href="#luyende">📝 Luyện đề</a>
        <a href="#lienhe">💬 Liên hệ</a>
    </div>
</div>

<h1>
TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04
</h1>

<div class="container">

    <div class="card"><a href="#"><img src="poster-su.png"></a></div>
    <div class="card"><a href="#"><img src="poster-dia.png"></a></div>
    <div class="card"><a href="#"><img src="dinhtinh.png"></a></div>
    <div class="card"><a href="#"><img src="dinhluong.png"></a></div>

</div>

<!-- 💬 MENU DƯỚI -->
<div class="radial-menu">

    <a class="radial-item fb" href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
    <a class="radial-item zalo" href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg"></a>
    <a class="radial-item mess" href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111466.png"></a>

    <div class="center-btn" onclick="toggleRadial()">💬</div>

</div>

<script>
    for(let i=0;i<80;i++){
        let s=document.createElement("div");
        s.className="star";
        s.style.left=Math.random()*100+"vw";
        s.style.top=Math.random()*100+"vh";
        s.style.animationDuration=(Math.random()*5+3)+"s";
        document.getElementById("stars").appendChild(s);
    }

    function toggleRadial(){
        document.querySelector(".radial-menu").classList.toggle("open");
    }

    function toggleMenu(){
        document.getElementById("topMenu").classList.toggle("open");
    }
</script>

</body>
</html>
