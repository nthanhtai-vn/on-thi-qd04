<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG</title>

    <style>
        body{
            margin:0;
            padding:30px;
            background:#000;
            font-family:Arial, Helvetica, sans-serif;
            text-align:center;
        }

        h1{
    margin-bottom:40px;
    font-size:32px;
    text-transform:uppercase;
    font-weight:bold;

    background: linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        lime,
        cyan,
        blue,
        violet,
        red
    );

    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: rgbText 5s linear infinite;

    text-shadow:
        0 0 10px rgba(255,255,255,0.5),
        0 0 20px rgba(255,255,255,0.3),
        0 0 30px rgba(255,255,255,0.2);
}
@keyframes rgbText{
    0%{
        background-position: 400% 0;
    }
    100%{
        background-position: 0% 0;
    }
}
        .container{
            display:flex;
            justify-content:center;
            gap:50px;
            flex-wrap:wrap;
        }

        .card{
    width:400px;
}

.card img{
    width:100%;
    border-radius:12px;
    box-shadow:0 0 15px rgba(255,255,255,0.2);
    transition:0.3s;
}

.card img:hover{
    transform:scale(1.05);
}
        .btn{
    position: relative;
    display: inline-block;
    margin-top: 15px;
    padding: 15px 35px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-decoration: none;
    border-radius: 12px;
    background: #111;
    overflow: hidden;
    z-index: 1;
    transition: 0.3s;
}

.btn:hover{
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(255,255,255,0.8);
}

.btn::before{
    content: "";
    position: absolute;
    top: -3px;
    left: -3px;
    right: -3px;
    bottom: -3px;
    background: linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        lime,
        cyan,
        blue,
        violet,
        red
    );
    background-size: 400%;
    border-radius: 15px;
    z-index: -2;
    animation: rgb-border 4s linear infinite;
}
.btn{
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from{
        box-shadow:
        0 0 10px red,
        0 0 20px orange,
        0 0 30px yellow;
    }

    to{
        box-shadow:
        0 0 20px cyan,
        0 0 40px blue,
        0 0 60px violet;
    }
}
.btn::after{
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    right: 3px;
    bottom: 3px;
    background: #111;
    border-radius: 10px;
    z-index: -1;
}

@keyframes rgb-border{
    0%{
        background-position: 0%;
    }
    100%{
        background-position: 400%;
    }
}
    </style>
</head>
<body>

    <h1>
        TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04 SỬ - ĐỊA
    </h1>

    <div class="container">

        <!-- Poster Sử -->
        <div class="card">
            <img src="poster-su.png" alt="Poster Lịch Sử">

            <br>

            <a class="btn"
               href="https://wayground.com/join?gc=40862793&source=liveDashboard"
               target="_blank">
                Bắt đầu làm bài
            </a>
        </div>

        <!-- Poster Địa -->
        <div class="card">
            <img src="poster-dia.png" alt="Poster Địa Lý">

            <br>

            <a class="btn"
               href="https://wayground.com/join?gc=11764809&source=liveDashboard"
               target="_blank">
                Bắt đầu làm bài
            </a>
        </div>

    </div>

</body>
</html>
