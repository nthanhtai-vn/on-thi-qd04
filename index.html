<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04</title>

<style>
    
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
    overflow: auto;
}

/* STAR */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:fall 5s linear infinite;
}
@keyframes fall{
    from{transform:translateY(0);}
    to{transform:translateY(100vh);}
}

/* TITLE - GIỮ NGUYÊN RGB */
h1{
    text-align:center;
    font-size:22px;
    background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:rgb 5s linear infinite;
}

@keyframes rgb{
    0%{background-position:0%;}
    100%{background-position:400%;}
}

/* PAGE */
.page{
    opacity:0;
    transform:scale(0.98);
    transition:0.4s;
    display:none;
    padding:20px;
}
.page.active{
    display:block;
    opacity:1;
    transform:scale(1);
}

/* CARD - GIỮ SIZE */
.container{
            display:flex;
            justify-content:center;
            gap:50px;
            flex-wrap:wrap;
        }

        .card{
            width:400px;
        }

        .card img{
            width:100%;
            border-radius:12px;
            box-shadow:0 0 15px rgba(255,255,255,0.2);
            transition:all .3s ease;
            cursor:pointer;
        }

        .card img:hover{
            transform:scale(1.05);
            box-shadow:
                0 0 20px cyan,
                0 0 40px blue,
                0 0 60px violet;
        }


/* MENU DRAG */
.menu{
    position:fixed;
    top:20px;
    right:20px;
    z-index:9999;
}

.menu-btn{
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(90deg,cyan,blue,violet);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:grab;
}

.menu-list{
    display:none;
    flex-direction:column;
    position:absolute;
    right:0;
    top:65px;
    background:#111;
    padding:10px;
    border-radius:10px;
}

.menu-list button{
    background:none;
    border:none;
    color:white;
    padding:10px;
    cursor:pointer;
    text-align:left;
}
.menu-list button:hover{color:cyan;}

/* FLOAT CHAT */
.chat-menu{
    position:fixed;
    bottom:25px;
    right:25px;
    width:120px;
    height:120px;
}

.chat-center{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(90deg,cyan,blue,violet);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    position:absolute;
    bottom:0;
    right:0;
}

.chat-item{
    position:absolute;
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    transform:scale(0) rotate(0deg);
    transform-origin:center;
    transition:0.35s cubic-bezier(.17,.67,.83,.67);
}
.chat-item img{
    width:30px;
    height:30px;
}
.fb{background:#1877F2;}
.zalo{background:#00c300;}
.mess{background:#0084ff;}

/* XOAY + BUNG */
.chat-menu.open .fb{
    transform:translate(-80px,-80px) scale(1) rotate(360deg);
}

.chat-menu.open .zalo{
    transform:translate(0,-110px) scale(1) rotate(360deg);
}

.chat-menu.open .mess{
    transform:translate(-110px,0) scale(1) rotate(360deg);
}

/* delay bung đẹp hơn */
.chat-menu.open .fb{ transition-delay:0s; }
.chat-menu.open .zalo{ transition-delay:0.05s; }
.chat-menu.open .mess{ transition-delay:0.1s; }
/* ====== TRANSITION OVERLAY (THÊM MỚI) ====== */
#transition{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    pointer-events:none;
    transition:0.25s;
    z-index:99999;
}
/* ===== BLUR BACKGROUND ===== */
#blur{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(8px);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:9998;
}

#blur.active{
    opacity:1;
}

/* ===== CHAT RADIAL INSTAGRAM STYLE ===== */
.chat-menu{
    position:fixed;
    bottom:25px;
    right:25px;
    width:120px;
    height:120px;
    z-index:9999;
}

.chat-center{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(90deg,cyan,blue,violet);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    position:absolute;
    bottom:0;
    right:0;
    z-index:10;
    transition:0.3s;
}

.chat-center:active{
    transform:scale(0.85);
}

/* ICON */
.chat-item{
    position:absolute;
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    transform:scale(0) rotate(0deg);
    transition:0.45s cubic-bezier(.17,.67,.83,.67);
}

.chat-item img{
    width:28px;
    height:28px;
}

/* ===== RADIAL CURVE ===== */
.chat-menu.open .fb{
    transform:translate(-95px,-85px) scale(1) rotate(360deg);
}

.chat-menu.open .zalo{
    transform:translate(0,-135px) scale(1) rotate(360deg);
}

.chat-menu.open .mess{
    transform:translate(95px,-85px) scale(1) rotate(360deg);
}

/* delay đẹp */
.chat-menu.open .fb{ transition-delay:0s; }
.chat-menu.open .zalo{ transition-delay:0.08s; }
.chat-menu.open .mess{ transition-delay:0.16s; }

/* hover */
.chat-item:hover{
    transform:scale(1.15) !important;
}

/* ===== RUNG EFFECT ===== */
@keyframes shake{
    0%{transform:translate(0,0);}
    25%{transform:translate(2px,-2px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(2px,2px);}
    100%{transform:translate(0,0);}
}
#transition.active{
    opacity:1;
}
@keyframes rgb{
  0%{background-position:0%}
  100%{background-position:400%}
}
</style>
</head>

<body>

</div>

<!-- CHAT -->
<div class="chat-menu" id="chat">

    <a class="chat-item fb" href="https://facebook.com/thanh.tai.207" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">

    <a class="chat-item zalo" href="https://zalo.me/0352332842" target="_blank">

    <a class="chat-item mess" href="https://m.me/@thanh.tai.207" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Facebook_Messenger_logo_2013.svg">

    <div class="chat-center" onclick="toggleChat()">💬</div>
</div>

<!-- BLUR BACKGROUND -->
<div id="blur"></div>
    <script type="module">

import {

  onAuthStateChanged,

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  apiKey: "AIzaSyC9XD2soTyIk9LzdfhMEDXT8WSuLF5tRkk",
  authDomain: "qd04-2026.firebaseapp.com",
  projectId: "qd04-2026",
  storageBucket: "qd04-2026.firebasestorage.app",
  messagingSenderId: "211337431663",
  appId: "1:211337431663:web:52f757b6c16d76ca489b9a",
  measurementId: "G-6QY8LB7M6B"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function(){
  let email = prompt("Email:");
  let pass = prompt("Password:");

  createUserWithEmailAndPassword(auth, email, pass)
    .then(()=>alert("Đăng ký thành công"))
    .catch(e=>alert(e.message));
}

window.login = function(){
  let email = prompt("Email:");
  let pass = prompt("Password:");

  signInWithEmailAndPassword(auth, email, pass)
    .then(()=>alert("Đăng nhập thành công"))
    .catch(()=>alert("Sai tài khoản hoặc mật khẩu"));
}

window.logout = function(){
  signOut(auth);
}

onAuthStateChanged(auth, user => {
  const app = document.getElementById("app");
  let loginBox = document.getElementById("loginBox");

  if (user) {
    app.style.display = "block";
document.getElementById("loginBox")?.remove();
  } else {
  app.style.display = "none";

  if (!loginBox) {
    document.body.insertAdjacentHTML("afterbegin", `
      <div id="loginBox" style="
          position:fixed;
          inset:0;
          display:flex;
          flex-direction:column;
          justify-content:center;
          align-items:center;
          background:rgba(0,0,0,0.85);
          z-index:99999;

          text-align:center;

      ">

        <h1 style="
            font-size:34px;
            margin-bottom:10px;

            width:420px;
            padding:25px;
            border-radius:18px;
            background:rgba(20,20,20,0.85);
        ">

          <input id="email" placeholder="Email" style="
              width:100%;
              padding:14px;
              margin:10px 0;
              border:none;
              border-radius:10px;
              font-size:18px;
          ">

          <input id="password" type="password" placeholder="Mật khẩu" style="
              width:100%;

              border:none;

          ">

          <button onclick="login()" style="
              width:100%;
              padding:14px;
              margin-top:10px;
              border:none;
              border-radius:12px;
              font-size:18px;
              background:linear-gradient(90deg,cyan,blue);
              color:white;
          ">
            ĐĂNG NHẬP
          </button>

          <button onclick="register()" style="
              width:100%;
              padding:14px;
              margin-top:10px;
              border:none;
              border-radius:12px;
              font-size:18px;
              background:linear-gradient(90deg,violet,blue);
              color:white;

            ĐĂNG KÝ
          </button>

        </div>

}
</script>
<script>

/* PAGE SWITCH + TRANSITION */
function show(id){
    let t = document.getElementById("transition");

    t.classList.add("active");

    setTimeout(()=>{
        document.querySelectorAll('.page').forEach(p=>{
            p.classList.remove('active');
        });

        document.getElementById(id).classList.add('active');

        t.classList.remove("active");
    }, 250);
}

/* MENU */
document.getElementById("dragBtn").onclick=()=>{
    let m=document.getElementById("menu");
    m.style.display = (m.style.display==="flex")?"none":"flex";
}

/* DRAG MENU */
let box=document.getElementById("menuBox");
let drag=document.getElementById("dragBtn");
let isDrag=false;

drag.onmousedown=()=>isDrag=true;

document.onmousemove=(e)=>{
    if(!isDrag) return;
    box.style.left=e.clientX+"px";
    box.style.top=e.clientY+"px";
    box.style.right="auto";
};

document.onmouseup=()=>isDrag=false;

/* CHAT */
function toggleChat(){
    let chat = document.getElementById("chat");
    let blur = document.getElementById("blur");

    chat.classList.toggle("open");
    blur.classList.toggle("active");

    // rung nhẹ
    chat.style.animation = "shake 0.3s";

    setTimeout(()=>{
        chat.style.animation = "";
    },300);
}

/* STAR */
for(let i=0;i<60;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.getElementById("stars").appendChild(s);
}

</script>
</div>
