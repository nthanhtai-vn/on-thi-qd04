<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG</title>

    <style>
        body{
            margin:0;
            padding:30px;
            background:#000;
            font-family:Arial, Helvetica, sans-serif;
            text-align:center;
            overflow:hidden;
        }

        /* 🌌 NỀN SAO */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: moveStars linear infinite;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(100vh); }
        }

        h1{
            margin-bottom:40px;
            font-size:32px;
            text-transform:uppercase;
            font-weight:bold;

            background: linear-gradient(
                90deg,
                red,
                orange,
                yellow,
                lime,
                cyan,
                blue,
                violet,
                red
            );

            background-size: 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: rgbText 5s linear infinite;

            text-shadow:
                0 0 10px rgba(255,255,255,0.5),
                0 0 20px rgba(255,255,255,0.3),
                0 0 30px rgba(255,255,255,0.2);
        }

        @keyframes rgbText{
            0%{ background-position: 400% 0; }
            100%{ background-position: 0% 0; }
        }

        .container{
            display:flex;
            justify-content:center;
            gap:50px;
            flex-wrap:wrap;
        }

        .card{
            width:400px;
        }

        .card img{
            width:100%;
            border-radius:12px;
            box-shadow:0 0 15px rgba(255,255,255,0.2);
            transition:all .3s ease;
            cursor:pointer;
        }

        .card img:hover{
            transform:scale(1.05);
            box-shadow:
                0 0 20px cyan,
                0 0 40px blue,
                0 0 60px violet;
        }

        /* 🌐 MENU VÒNG TRÒN */
        .radial-menu{
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 120px;
            height: 120px;
            z-index: 999;
        }

        .center-btn{
            position: absolute;
            bottom: 0;
            right: 0;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(90deg, cyan, blue, violet);
            color: white;
            font-size: 28px;
            font-weight: bold;
            display:flex;
            justify-content:center;
            align-items:center;
            cursor:pointer;
            box-shadow:0 0 15px rgba(0,255,255,0.5);
            transition:0.3s;
        }

        .center-btn:hover{
            transform: scale(1.1);
        }

        .radial-item{
            position: absolute;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display:flex;
            justify-content:center;
            align-items:center;
            text-decoration:none;
            color:white;
            font-size:18px;

            transform: scale(0);
            opacity:0;
            transition:0.3s;
        }

        .fb{ background:#1877F2; }
        .zalo{ background:#00c300; }
        .mess{ background:#0084ff; }

        /* ✨ BUNG MENU (SỬA LẠI CHO CHUẨN) */
        .radial-menu.open .fb{
            transform: translate(-80px, -80px) scale(1);
            opacity:1;
        }

        .radial-menu.open .zalo{
            transform: translate(0px, -110px) scale(1);
            opacity:1;
        }

        .radial-menu.open .mess{
            transform: translate(-110px, 0px) scale(1);
            opacity:1;
        }

    </style>
</head>

<body>

    <!-- 🌌 SAO BAY -->
    <div id="stars"></div>

    <h1>
        TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04
    </h1>

    <div class="container">

        <div class="card">
            <a href="https://wayground.com/join?gc=15993929&source=liveDashboard" target="_blank">
                <img src="poster-su.png" alt="Poster Lịch Sử">
            </a>
        </div>

        <div class="card">
            <a href="https://wayground.com/join?gc=49417289&source=liveDashboard" target="_blank">
                <img src="poster-dia.png" alt="Poster Địa Lý">
            </a>
        </div>

        <div class="card">
            <a href="https://drive.google.com/drive/folders/1XjkgB0eCab9F9WjYYCW_Ls7Qgza83J1B" target="_blank">
                <img src="dinhtinh.png" alt="Poster Định Tính">
            </a>
        </div>

        <div class="card">
            <a href="https://drive.google.com/drive/folders/15Imf-08fg8yrheXhrrH_b-YWzosJc47d" target="_blank">
                <img src="dinhluong.png" alt="Poster Định Lượng">
            </a>
        </div>

    </div>

    <!-- 🌐 MENU VÒNG TRÒN -->
    <div class="radial-menu">

        <a href="https://facebook.com/thanh.tai.207" target="_blank" class="radial-item fb">f</a>
        <a href="https://zalo.me/0352332842" target="_blank" class="radial-item zalo">z</a>
        <a href="https://m.me/@thanh.tai.207" target="_blank" class="radial-item mess">m</a>

        <div class="center-btn" onclick="toggleRadial()">+</div>

    </div>

    <!-- JS tạo sao + toggle -->
    <script>
        for (let i = 0; i < 80; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            star.style.animationDuration = (Math.random() * 5 + 3) + "s";
            document.getElementById("stars").appendChild(star);
        }

        function toggleRadial(){
            document.querySelector(".radial-menu").classList.toggle("open");
        }
    </script>

</body>
</html>
