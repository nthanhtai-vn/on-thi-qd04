<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04</title>

<style>
body{
    margin:0;
    padding:30px;
    background:#000;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
    color:white;
}

/* STAR */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:fall linear infinite;
}
@keyframes fall{
    from{transform:translateY(0);}
    to{transform:translateY(100vh);}
}

/* TITLE */
h1{
    font-size:26px;
    background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* CONTENT FADE */
#content{
    opacity:1;
    transition:0.4s;
}

/* CARDS */
.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
}
.card img{
    width:300px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}
.card img:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px cyan;
}

/* MENU DRAG */
.menu{
    position:fixed;
    top:20px;
    right:20px;
    z-index:999;
}

.menu-btn{
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(90deg,cyan,blue,violet);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    cursor:grab;
    position:relative;
}

.menu-list{
    display:none;
    flex-direction:column;
    position:absolute;
    top:65px;
    right:0;
    background:#111;
    padding:10px;
    border-radius:10px;
}

.menu-list button{
    background:none;
    border:none;
    color:white;
    padding:10px;
    cursor:pointer;
    text-align:left;
}
.menu-list button:hover{color:cyan;}
</style>
</head>

<body>

<div id="stars"></div>

<h1>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04</h1>

<!-- MENU -->
<div class="menu" id="menuBox">
    <div class="menu-btn" id="dragBtn">☰</div>

    <div class="menu-list" id="menu">
        <button onclick="showPage('home')">🏠 Trang chủ</button>
        <button onclick="showPage('luyende')">🧠 Luyện đề</button>
        <button onclick="showPage('tailieu')">📚 Tài liệu</button>
    </div>
</div>

<!-- CONTENT -->
<div id="content"></div>

<script>

/* DATA ĐÚNG LẠI */
const home = `
<div class="container">
<a class="card" href="https://wayground.com/1" target="_blank"><img src="poster-su.png"></a>
<a class="card" href="https://wayground.com/2" target="_blank"><img src="poster-dia.png"></a>
<a class="card" href="https://drive.google.com/3" target="_blank"><img src="dinhtinh.png"></a>
<a class="card" href="https://drive.google.com/4" target="_blank"><img src="dinhluong.png"></a>
</div>`;

const luyende = `
<div class="container">
<a class="card" href="https://wayground.com/1" target="_blank"><img src="poster-su.png"></a>
<a class="card" href="https://wayground.com/2" target="_blank"><img src="poster-dia.png"></a>
</div>`;

const tailieu = `
<div class="container">
<a class="card" href="https://wayground.com/1" target="_blank"><img src="poster-su.png"></a>
<a class="card" href="https://wayground.com/2" target="_blank"><img src="poster-dia.png"></a>
<a class="card" href="https://drive.google.com/3" target="_blank"><img src="dinhtinh.png"></a>
<a class="card" href="https://drive.google.com/4" target="_blank"><img src="dinhluong.png"></a>
</div>`;

/* FADE SWITCH */
function showPage(page){
    let c = document.getElementById("content");
    c.style.opacity = 0;

    setTimeout(()=>{
        if(page==="home") c.innerHTML = home;
        if(page==="luyende") c.innerHTML = luyende;
        if(page==="tailieu") c.innerHTML = tailieu;
        c.style.opacity = 1;
    },200);
}

/* MENU TOGGLE */
document.getElementById("dragBtn").onclick = ()=>{
    let m = document.getElementById("menu");
    m.style.display = m.style.display==="flex"?"none":"flex";
};

/* DRAG MENU */
let box = document.getElementById("menuBox");
let drag = document.getElementById("dragBtn");

let isDrag = false;

drag.addEventListener("mousedown", e=>{
    isDrag = true;
});

document.addEventListener("mousemove", e=>{
    if(!isDrag) return;
    box.style.left = e.clientX + "px";
    box.style.top = e.clientY + "px";
    box.style.right = "auto";
});

document.addEventListener("mouseup", ()=>{
    isDrag = false;
});

/* INIT */
showPage("home");

/* STAR */
for(let i=0;i<60;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    s.style.animationDuration=(Math.random()*5+3)+"s";
    document.getElementById("stars").appendChild(s);
}

</script>

</body>
</html>
