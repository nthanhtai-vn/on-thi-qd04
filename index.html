<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
    overflow: auto;
}

/* STAR */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:fall 5s linear infinite;
}
@keyframes fall{
    from{transform:translateY(0);}
    to{transform:translateY(100vh);}
}

/* TITLE - GIỮ NGUYÊN RGB */
h1{
    text-align:center;
    font-size:22px;
    background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:rgb 5s linear infinite;
}

@keyframes rgb{
    0%{background-position:0%;}
    100%{background-position:400%;}
}

/* PAGE */
.page{
    opacity:0;
    transform:scale(0.98);
    transition:0.4s;
    display:none;
    padding:20px;
}
.page.active{
    display:block;
    opacity:1;
    transform:scale(1);
}

/* CARD - GIỮ SIZE */
.container{
            display:flex;
            justify-content:center;
            gap:50px;
            flex-wrap:wrap;
        }

        .card{
            width:400px;
        }

        .card img{
            width:100%;
            border-radius:12px;
            box-shadow:0 0 15px rgba(255,255,255,0.2);
            transition:all .3s ease;
            cursor:pointer;
        }

        .card img:hover{
            transform:scale(1.05);
            box-shadow:
                0 0 20px cyan,
                0 0 40px blue,
                0 0 60px violet;
        }


/* MENU DRAG */
.menu{
    position:fixed;
    top:20px;
    right:20px;
    z-index:9999;
}

.menu-btn{
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(90deg,cyan,blue,violet);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:grab;
}

.menu-list{
    display:none;
    flex-direction:column;
    position:absolute;
    right:0;
    top:65px;
    background:#111;
    padding:10px;
    border-radius:10px;
}

.menu-list button{
    background:none;
    border:none;
    color:white;
    padding:10px;
    cursor:pointer;
    text-align:left;
}
.menu-list button:hover{color:cyan;}

/* FLOAT CHAT */
.chat-menu{
    position:fixed;
    bottom:25px;
    right:25px;
    width:120px;
    height:120px;
}

.chat-center{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(90deg,cyan,blue,violet);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    position:absolute;
    bottom:0;
    right:0;
}

.chat-item{
    position:absolute;
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    transform:scale(0) rotate(0deg);
    transform-origin:center;
    transition:0.35s cubic-bezier(.17,.67,.83,.67);
}
.chat-item img{
    width:30px;
    height:30px;
}
.fb{background:#1877F2;}
.zalo{background:#00c300;}
.mess{background:#0084ff;}

/* XOAY + BUNG */
.chat-menu.open .fb{
    transform:translate(-80px,-80px) scale(1) rotate(360deg);
}

.chat-menu.open .zalo{
    transform:translate(0,-110px) scale(1) rotate(360deg);
}

.chat-menu.open .mess{
    transform:translate(-110px,0) scale(1) rotate(360deg);
}

/* delay bung đẹp hơn */
.chat-menu.open .fb{ transition-delay:0s; }
.chat-menu.open .zalo{ transition-delay:0.05s; }
.chat-menu.open .mess{ transition-delay:0.1s; }
/* ====== TRANSITION OVERLAY (THÊM MỚI) ====== */
#transition{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    pointer-events:none;
    transition:0.25s;
    z-index:99999;
}

#transition.active{
    opacity:1;
}

</style>
</head>

<body>

<div id="stars"></div>
<div id="transition"></div>

<h1>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04</h1>

<!-- MENU -->
<div class="menu" id="menuBox">
    <div class="menu-btn" id="dragBtn">☰</div>

    <div class="menu-list" id="menu">
        <button onclick="show('home')">Trang chủ</button>
        <button onclick="show('luyende')">Luyện đề</button>
        <button onclick="show('tailieu')">Tài liệu</button>
    </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
    <div class="container">
        <a class="card" href="https://wayground.com/1"><img src="poster-su.png"></a>
        <a class="card" href="https://wayground.com/2"><img src="poster-dia.png"></a>
        <a class="card" href="https://drive.google.com/3"><img src="dinhtinh.png"></a>
        <a class="card" href="https://drive.google.com/4"><img src="dinhluong.png"></a>
    </div>
</div>

<!-- LUYỆN ĐỀ -->
<div id="luyende" class="page">
    <div class="container">
        <a class="card" href="https://wayground.com/1"><img src="luyendesu.png"></a>
        <a class="card" href="https://wayground.com/2"><img src="poster-dia.png"></a>
    </div>
</div>

<!-- TÀI LIỆU -->
<div id="tailieu" class="page">
    <div class="container">
        <a class="card" href="https://wayground.com/1"><img src="poster-su.png"></a>
        <a class="card" href="https://wayground.com/2"><img src="poster-dia.png"></a>
        <a class="card" href="https://drive.google.com/3"><img src="dinhtinh.png"></a>
        <a class="card" href="https://drive.google.com/4"><img src="dinhluong.png"></a>
    </div>
</div>

<!-- CHAT -->
<div class="chat-menu" id="chat">
   <a class="chat-item fb" href="https://facebook.com/thanh.tai.207" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="30">
</a>

<a class="chat-item zalo" href="https://zalo.me/0352332842" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" width="30">
</a>

<a class="chat-item mess" href="https://m.me/@thanh.tai.207" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Facebook_Messenger_logo_2013.svg" width="30">
</a>
    <div class="chat-center" onclick="toggleChat()">💬</div>
</div>

<script>

/* PAGE SWITCH + TRANSITION */
function show(id){
    let t = document.getElementById("transition");

    t.classList.add("active");

    setTimeout(()=>{
        document.querySelectorAll('.page').forEach(p=>{
            p.classList.remove('active');
        });

        document.getElementById(id).classList.add('active');

        t.classList.remove("active");
    }, 250);
}

/* MENU */
document.getElementById("dragBtn").onclick=()=>{
    let m=document.getElementById("menu");
    m.style.display = (m.style.display==="flex")?"none":"flex";
}

/* DRAG MENU */
let box=document.getElementById("menuBox");
let drag=document.getElementById("dragBtn");
let isDrag=false;

drag.onmousedown=()=>isDrag=true;

document.onmousemove=(e)=>{
    if(!isDrag) return;
    box.style.left=e.clientX+"px";
    box.style.top=e.clientY+"px";
    box.style.right="auto";
};

document.onmouseup=()=>isDrag=false;

/* CHAT */
function toggleChat(){
    document.getElementById("chat").classList.toggle("open");
}

/* STAR */
for(let i=0;i<60;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.getElementById("stars").appendChild(s);
}

</script>

</body>
</html>
