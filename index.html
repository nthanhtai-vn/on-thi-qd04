<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG</title>

    <style>
        body{
            margin:0;
            padding:30px;
            background:#000;
            font-family:Arial, Helvetica, sans-serif;
            text-align:center;
        }

        h1{
            color:#FFD700;
            margin-bottom:40px;
            font-size:32px;
            text-transform:uppercase;
        }

        .container{
            display:flex;
            justify-content:center;
            gap:50px;
            flex-wrap:wrap;
        }

        .card{
            width:400px;
        }

        .card img{
            width:100%;
            border-radius:12px;
            box-shadow:0 0 15px rgba(255,255,255,0.2);
        }

        .btn{
            display:inline-block;
            margin-top:15px;
            padding:14px 28px;
            background:#007BFF;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:#0056b3;
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <h1>
        TÀI LIỆU ÔN THI ĐÁNH GIÁ NĂNG LỰC BỘ QUỐC PHÒNG - QD04 SỬ - ĐỊA
    </h1>

    <div class="container">

        <!-- Poster Sử -->
        <div class="card">
            <img src="poster-su.png" alt="Poster Lịch Sử">

            <br>

            <a class="btn"
               href="https://wayground.com/join?gc=40862793&source=liveDashboard"
               target="_blank">
                Bắt đầu làm bài
            </a>
        </div>

        <!-- Poster Địa -->
        <div class="card">
            <img src="poster-dia.png" alt="Poster Địa Lý">

            <br>

            <a class="btn"
               href="https://wayground.com/join?gc=11764809&source=liveDashboard"
               target="_blank">
                Bắt đầu làm bài
            </a>
        </div>

    </div>

</body>
</html>
