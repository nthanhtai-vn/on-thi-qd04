<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPA ÔN THI PRO</title>

<style>
body{
    margin:0;
    padding:30px;
    background:#000;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

/* 🌌 STAR */
#stars{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    z-index:-1;
}
.star{
    position:absolute;
    width:2px;height:2px;
    background:#fff;
    border-radius:50%;
    opacity:0.6;
    animation:fall linear infinite;
}
@keyframes fall{
    from{transform:translateY(0)}
    to{transform:translateY(100vh)}
}

/* TITLE */
h1{
    font-size:28px;
    color:transparent;
    background:linear-gradient(90deg,red,orange,yellow,cyan,blue,violet,red);
    background-size:400%;
    -webkit-background-clip:text;
    animation:rgb 5s linear infinite;
}
@keyframes rgb{
    0%{background-position:400%}
    100%{background-position:0%}
}

/* PAGE SYSTEM */
.page{
    display:none;
}
.page.active{
    display:block;
}

/* CARD */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:40px;
}
.card img{
    width:320px;
    border-radius:12px;
    transition:.3s;
}
.card img:hover{
    transform:scale(1.05);
}

/* MENU TOP */
.top-menu{
    position:fixed;
    top:20px;
    right:20px;
    z-index:999;
}
.menu-btn{
    width:50px;height:50px;
    background:linear-gradient(90deg,cyan,blue,violet);
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    color:#fff;
    font-size:24px;
}
.dropdown{
    display:none;
    position:absolute;
    top:60px;
    right:0;
    background:#111;
    border-radius:10px;
    overflow:hidden;
}
.dropdown a{
    display:block;
    padding:12px;
    color:#fff;
    text-decoration:none;
}
.dropdown a:hover{
    background:cyan;
    color:black;
}
.top-menu.open .dropdown{
    display:block;
}

/* BOTTOM MENU */
.radial{
    position:fixed;
    bottom:20px;
    right:20px;
}
.main-btn{
    width:60px;height:60px;
    border-radius:50%;
    background:linear-gradient(90deg,cyan,blue,violet);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    color:#fff;
    font-size:22px;
}
.items{
    position:absolute;
    bottom:70px;
    right:0;
}
.item{
    width:45px;height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:8px 0;
    transform:scale(0);
    transition:.3s;
}
.radial.open .item{
    transform:scale(1);
}
.fb{background:#1877F2}
.zalo{background:#00c300}
.mess{background:#0084ff}

img{
    max-width:100%;
}
</style>
</head>

<body>

<div id="stars"></div>

<!-- MENU TOP -->
<div class="top-menu" id="topMenu">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="dropdown">
<a onclick="showPage('home')">🏠 Trang chủ</a>
<a onclick="showPage('docs')">📚 Tài liệu</a>
<a onclick="showPage('exam')">📝 Luyện đề</a>
<a onclick="showPage('contact')">💬 Liên hệ</a>
</div>
</div>

<h1>ÔN THI ĐÁNH GIÁ NĂNG LỰC</h1>

<!-- PAGES -->
<div id="home" class="page active">
<div class="container">
<div class="card"><img src="poster-su.png"></div>
<div class="card"><img src="poster-dia.png"></div>
<div class="card"><img src="dinhtinh.png"></div>
<div class="card"><img src="dinhluong.png"></div>
</div>
</div>

<div id="docs" class="page">
<h2 style="color:white">📚 TÀI LIỆU</h2>
<div class="container">
<div class="card"><img src="dinhtinh.png"></div>
<div class="card"><img src="dinhluong.png"></div>
<div class="card"><img src="poster-su.png"></div>
<div class="card"><img src="poster-dia.png"></div>
</div>
</div>

<div id="exam" class="page">
<h2 style="color:white">📝 LUYỆN ĐỀ</h2>
<div class="container">
<div class="card"><img src="poster-su.png"></div>
<div class="card"><img src="poster-dia.png"></div>
</div>
</div>

<div id="contact" class="page">
<h2 style="color:white">LIÊN HỆ</h2>
</div>

<!-- BOTTOM MENU -->
<div class="radial" id="radial">
<div class="main-btn" onclick="toggleRadial()">💬</div>
<div class="items">
<div class="item fb">f</div>
<div class="item zalo">z</div>
<div class="item mess">m</div>
</div>
</div>

<script>
// STAR
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(Math.random()*5+3)+"s";
document.getElementById("stars").appendChild(s);
}

// MENU TOP
function toggleMenu(){
document.getElementById("topMenu").classList.toggle("open");
}

// RADIAL
function toggleRadial(){
document.getElementById("radial").classList.toggle("open");
}

// SPA PAGE SWITCH
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.getElementById("topMenu").classList.remove("open");
}
</script>

</body>
</html>
